version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: porra-mysql
    environment:
      MYSQL_DATABASE: porra_global
      MYSQL_USER: porra
      MYSQL_PASSWORD: porra_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uporra", "-pporra_secret"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: porra-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/porra_global?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: porra
      SPRING_DATASOURCE_PASSWORD: porra_secret
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-minimum-256-bits-secret-key-here}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: porra-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
